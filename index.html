<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel & Hospitality Demo</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg, #0E1B2C);
      color: var(--text, #F0E9DD);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      transition: background 0.4s ease, color 0.4s ease;
    }
    .stage { padding: 2rem; }
    h1 {
      color: var(--accent, #C9A961);
      letter-spacing: 0.3em;
      font-weight: 300;
      margin: 0 0 0.75rem;
      font-size: clamp(2rem, 5vw, 3.5rem);
    }
    .tagline { font-style: italic; opacity: 0.8; margin: 0 0 1.5rem; font-size: 1.1rem; }
    .headline {
      color: var(--accent, #C9A961);
      margin: 0;
      opacity: 0.6;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }
    .hint { opacity: 0.6; margin: 0; }
    code { color: var(--accent, #C9A961); }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <h1 id="brand-name">TRAVEL &amp; HOSPITALITY DEMO</h1>
    <p class="tagline" id="brand-tagline" hidden></p>
    <p class="headline" id="brand-headline" hidden></p>
    <p class="hint" id="hint">Add <code>?demo=KERZNER</code> to the URL to load a brand</p>
  </div>

  <script>
    const demoKey = new URLSearchParams(window.location.search).get('demo');

    if (demoKey) {
      const script = document.createElement('script');
      script.src = `./configs/${demoKey.toLowerCase()}.js`;
      script.onload = () => {
        const cfg = window.BRAND_CONFIG;
        if (!cfg) return;

        const root = document.documentElement.style;
        root.setProperty('--bg', cfg.theme.bg);
        root.setProperty('--text', cfg.theme.text);
        root.setProperty('--accent', cfg.theme.accent);

        document.getElementById('brand-name').textContent = cfg.brand.name.toUpperCase();

        const tagline = document.getElementById('brand-tagline');
        tagline.textContent = cfg.brand.tagline;
        tagline.hidden = false;

        const headline = document.getElementById('brand-headline');
        headline.textContent = cfg.brand.headline;
        headline.hidden = false;

        document.getElementById('hint').hidden = true;
      };
      script.onerror = () => {
        document.getElementById('hint').textContent = `Config not found for "${demoKey}"`;
      };
      document.head.appendChild(script);
    }
  </script>
</body>
</html>
